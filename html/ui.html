<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="theme-color" content="#0f1118" />
        <title>NVRS Playtime Shop</title>
        <link rel="stylesheet" type="text/css" href="css/main.css" />
        <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.2/css/all.min.css"
            integrity="sha512-1sCRPdkRXhBV2PBLUdRb4tMg1w2YPf37qatUFeS7zlBy7jJI8Lf4VHwWfZZfpXtYSLy85pkm9GaYVYMfw5BC1A=="
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        />
    </head>
    <body>
        <div class="succesfullyArea" aria-live="polite">
            <div class="succesNotify">Thanks for purchasing!</div>
        </div>
        <div class="notifySectionXX">
            <div class="notifyArea" role="alert"></div>
        </div>
        <div class="coinBuyArea">
            <div class="coinBuyMain">
                <div class="exitAreaBuy">
                    <span id="exitText">Exit</span>
                    <span><i id="exitBttn" class="fa-sharp fa-solid fa-circle-xmark" aria-hidden="true"></i></span>
                </div>
                <div class="coinListArea"></div>
                <div class="redeemSection">
                    <label class="sr-only" for="redeemCodeInput">Redeem code</label>
                    <input type="text" class="writeTheCode" id="redeemCodeInput" autocomplete="off" placeholder="Enter redeem code..." />
                    <div class="redeemOkButton" role="button">OK</div>
                </div>
            </div>
        </div>
        <div class="youWantBuySection">
            <div class="wantGeneral">
                <div class="wantText"></div>
                <div class="wantRectangle"></div>
                <div class="wantItemArea">
                    <div class="wantItemName">Item</div>
                    <div class="wantItemCount">X1</div>
                </div>
                <div class="wantRectangle"></div>
                <div class="wantItemButtonArea">
                    <div class="wantButton" id="wantCancelButton">CANCEL</div>
                    <div class="wantButton" id="wantBuyButton">BUY</div>
                </div>
            </div>
        </div>
        <div class="succesfullyPurchArea">
            <div class="succesfullMain">
                <div class="succesItemLabel">Item</div>
                <div class="succesItemImageArea">
                    <img id="succesImg" src="./images/car.png" alt="" />
                </div>
                <div class="successfullyText">SUCCESSFULLY</div>
                <div class="purchasedText">PURCHASED</div>
            </div>
        </div>
        <div class="generalSection">
            <div class="generalTopSection">
                <div class="titleArea">
                    <div class="titleImageArea">
                        <img src="./images/clock.png" alt="" />
                    </div>
                    <div class="titleTextArea">
                        <div class="title1">NVRS</div>
                        <div class="title2">Playtime</div>
                    </div>
                </div>
                <div class="topFirstRectangle"></div>
                <div class="profileArea">
                    <div class="profilePhoto">
                        <img id="profilePhotoX" src="./images/pp.png" alt="Profile" />
                    </div>
                    <div class="profileTextArea">
                        <div class="profileNameArea">
                            <div class="firstName">First</div>
                            <div class="lastName">Last</div>
                        </div>
                        <div class="profileCreditArea">
                            <div class="creditIconArea">
                                <img src="./images/coin.png" alt="" />
                            </div>
                            <div class="creditTextArea">
                                <div class="creditCount">0</div>
                                <div class="creditText">COIN</div>
                            </div>
                            <div class="addCreditButton" title="Credit packs">+</div>
                        </div>
                    </div>
                </div>
                <div class="nextRewardArea">
                    <i id="clockIcon" class="fa-solid fa-clock" aria-hidden="true"></i>
                    <div class="rewardTextArea">
                        <div class="rewardText1">NEXT REWARD</div>
                        <div class="nextCoinTime">00m 00s</div>
                        <div class="rewardText3Area">
                            <div class="rewardText5">REWARD</div>
                            <div class="rewardText6">0 COIN</div>
                        </div>
                    </div>
                </div>
                <div class="exitButtonArea">
                    <div class="exitText">EXIT</div>
                    <div class="exitButtonBorder">
                        <i id="exitIcon" class="fa-solid fa-xmark" aria-hidden="true"></i>
                    </div>
                </div>
            </div>

            <div class="generalBottomSection">
                <div class="bottomLeftWrapper">
                    <img id="leftImage" src="./images/leftBorder.png" alt="" />
                    <div class="rankingTextArea">
                        <div class="weeklyText">TOP</div>
                        <div class="rankingText">PLAYERS</div>
                    </div>
                    <div class="rankAreaRankList"></div>
                    <div class="topTextArea">
                        <div class="topText">TOP</div>
                        <div class="text6">6</div>
                    </div>
                </div>
                <div class="bottomRightWrapper">
                    <img id="rightImage" src="./images/rightBox.png" alt="" />
                    <div class="rightBoxTopArea">
                        <div class="plyTmShopTextArea">
                            <div class="playTmText">PLAYTIME</div>
                            <div class="shpText">SHOP</div>
                        </div>
                        <div class="rightBoxRectangle"></div>
                    </div>
                    <div class="rightItemList"></div>
                    <div class="rightItemBottomButtonArea">
                        <div class="previousButton">
                            <i id="arrowButton" class="fa-solid fa-arrow-left" aria-hidden="true"></i>
                            <div class="previousText">PREVIOUS PAGE</div>
                        </div>
                        <div class="pageArea">
                            <div class="currentPage">1</div>
                            <div class="totalPage">/ 1</div>
                        </div>
                        <div class="nextButton">
                            <div class="nextText">NEXT PAGE</div>
                            <i id="rightArrowButton" class="fa-solid fa-arrow-right" aria-hidden="true"></i>
                        </div>
                    </div>
                </div>
                <div class="categorySection"></div>
            </div>
        </div>
        <script src="js/fontawesome.min.js"></script>
        <script src="js/jquery-3.6.0.min.js"></script>
        <script src="js/jquery-ui.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
        <script src="js/progressbar.js"></script>
        <script src="js/app.js"></script>
    </body>
</html>
